<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<link rel="icon" href="logo.png" sizes="32x32">
<link rel="icon" href="logo.png" sizes="192x192">
<link rel="apple-touch-icon" href="logo.png">
<link rel="stylesheet" href="style.css">
<script src="script.js"></script>
</head>

<body onload="checkAdmin(); loadAdminData(); displayMembers(); displayRules();">

<header>
<h1>ADMIN PANEL</h1>

<nav>
<a href="index.html">Home</a>
<a href="members.html">Members</a>
<a href="rules.html">Peraturan</a>
<a href="#" onclick="logout()">Logout</a>
</nav>
</header>

<!-- ================= MEMBERS ================= -->
<section class="content">
<h2>Kemaskini Members</h2>

<textarea id="membersInput" rows="6"
placeholder="Masukkan nama ahli (satu setiap baris)"></textarea>

<button class="btn" onclick="updateMembers()">Tambah Members</button>

<h3>Senarai Members</h3>
<ul id="membersList"></ul>
</section>

<!-- ================= RULES ================= -->
<section class="content">
<h2>Kemaskini Rules</h2>

<textarea id="rulesInput" rows="6"
placeholder="Masukkan peraturan (satu setiap baris)"></textarea>

<button class="btn" onclick="updateRules()">Tambah Rules</button>

<h3>Senarai Rules</h3>
<ul id="rulesList"></ul>
</section>

</body>
</html>
